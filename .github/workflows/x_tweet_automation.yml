name: X Auto Tweet

on:
  workflow_dispatch:

  # schedule:
  #   - cron: "0 10 * * *" # 10:00 UTC (15:30 IST)

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Restore X session cache
        id: cache-x-session
        uses: actions/cache@v4
        with:
          path: .x_session.json
          key: x-session-${{ runner.os }}
          restore-keys: |
            x-session-

      - name: Load X session from secret (fallback)
        if: steps.cache-x-session.outputs.cache-hit != 'true'
        env:
          X_SESSION_JSON: ${{ secrets.X_SESSION_JSON }}
        run: |
          if [ -n "$X_SESSION_JSON" ]; then
            echo "$X_SESSION_JSON" > .x_session.json
            echo "✅ Loaded X session from repository secrets."
          else
            echo "⚠️ No cached session or secret found. Falling back to username/password login."
          fi

      - name: Write Google service account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "❌ GOOGLE_SERVICE_ACCOUNT_JSON secret is missing"
            exit 1
          fi

          mkdir -p credentials
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > credentials/service-account.json

          python << 'PY'
          import json
          from pathlib import Path

          data = Path("credentials/service-account.json").read_text()
          json.loads(data)

          print("✅ GOOGLE_SERVICE_ACCOUNT_JSON is valid JSON")
          PY

      - name: Run automation script
        env:
          PYTHONUNBUFFERED: "1"

          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}

          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          X_EMAIL: ${{ secrets.X_EMAIL }}

          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: credentials/service-account.json
          SHEET_NAME: "Tweets for x"

          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

          MAX_RETRIES: 3
          QUALITY_MIN_SCORE: 6

        run: python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs
          path: logs/
          if-no-files-found: ignore
